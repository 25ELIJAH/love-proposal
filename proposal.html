<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Special Message For You 💝</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="proposal-body">

    <div class="hearts-container" id="hearts-container"></div>

    <div class="proposal-card" id="proposal-card">

      <div class="proposal-header">
        <h1 id="proposal-title">💝</h1>
        <p id="proposal-subtitle"></p>
      </div>

      <div class="memories" id="memories"></div>

      <div class="proposal-message" id="proposal-message"></div>

      <div class="proposal-actions">
        <p class="question" id="proposal-question"></p>
        <div class="buttons">
          <button class="yes-btn" id="yes-btn">Yes! 💖</button>
          <button class="no-btn" id="no-btn">No 😢</button>
        </div>
      </div>

    </div>

    <div class="celebration" id="celebration" style="display: none;">
      <div class="celebration-card">
        <h1>She Said Yes! 🎉💍</h1>
        <p id="celebration-message"></p>
        <div class="confetti-container" id="confetti-container"></div>
      </div>
    </div>

    <iframe id="yt-music" 
  src="https://www.youtube.com/embed/vGJTaP6anOU?autoplay=1&loop=1&playlist=vGJTaP6anOU&controls=0&mute=0&volume=20" 
  allow="autoplay; encrypted-media"
  style="display:none;"
  width="0"
  height="0">
</iframe>

  
    <script src="proposal.js"></script>
  </body>
</html>
