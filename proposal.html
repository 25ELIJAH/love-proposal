<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Special Message For You 💝</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Pinyon+Script&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  </head>
  <body class="proposal-body">

    <div class="hearts-container" id="hearts-container"></div>

    <div class="proposal-card" id="proposal-card">

      <div class="proposal-header">
        <h1 id="proposal-title"></h1>
        <p id="proposal-subtitle"></p>
      </div>

      <div class="memories" id="memories"></div>

      <div class="proposal-message" id="proposal-message"></div>

      <div class="proposal-actions">
        <p class="question" id="proposal-question"></p>
        <div class="buttons">
          <button class="yes-btn" id="yes-btn">Yes! 💖</button>
          <button class="no-btn" id="no-btn">No 😢</button>
        </div>
      </div>

    </div>

    <iframe id="yt-music"
      src=""
      allow="autoplay; encrypted-media"
      style="display:none;"
      width="0"
      height="0">
    </iframe>

    <script src="proposal.js"></script>
  </body>
</html>
